---
name: Ansible

on: [push]
# From https://dev.to/koh_sh/automatic-ansible-lint-with-github-actions-52oe
jobs:
  build:

    runs-on: ubuntu-latest
    strategy:
      max-parallel: 4
      matrix:
        python-version: ["3.12"]
        ansible-version: [9.1.0]
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install Ansible ${{ matrix.ansible-version }}
        run: |
          python -m pip install --upgrade pip
          pip install yamllint ansible==${{ matrix.ansible-version }}
      - name: Lint playbook
        run: |
          ansible-galaxy role install -r requirements.yml
          ansible-galaxy collection install -r requirements.yml
          ansible-playbook playbook/setup-dell.yaml --syntax-check
          ansible-playbook playbook/setup-home.yaml --syntax-check
          ansible-playbook playbook/setup-gop.yaml --syntax-check
          yamllint .
