---
name: Ansible

on: [push]
# From https://dev.to/koh_sh/automatic-ansible-lint-with-github-actions-52oe
jobs:
  build:

    runs-on: ubuntu-latest
    strategy:
      max-parallel: 4
      matrix:
        python-version: ["3.12"]
        ansible-version: [9.1.0]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install Ansible ${{ matrix.ansible-version }}
        run: |
          python -m pip install --upgrade pip
          pip install yamllint ansible==${{ matrix.ansible-version }}
      - name: Lint playbook
        run: |
          ansible-galaxy role install -r requirements.yml
          ansible-galaxy collection install -r requirements.yml
          ansible-playbook playbook/setup-dell.yaml --syntax-check
          ansible-playbook playbook/setup-home.yaml --syntax-check
          ansible-playbook playbook/setup-gop.yaml --syntax-check
          yamllint .
